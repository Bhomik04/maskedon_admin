    <title>maskedon Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              admin: {
                bg: '#0f1117',
                card: '#1a1d27',
                border: '#2a2d3e',
                accent: '#6c63ff',
                danger: '#ef4444',
                success: '#22c55e',
